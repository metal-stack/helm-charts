{{- if .Values.httpRoute.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metal-api
  {{- with .Values.httpRoute.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  parentRefs:
{{ toYaml .Values.httpRoute.parentRefs | indent 4 }}
  hostnames:
    - {{ .Values.ingress_public_dns | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.metal_api.base_path | quote }}
      backendRefs:
        - name: metal-api
          port: {{ .Values.ports.metal_api }}
{{- if .Values.metal_apiserver.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
# Although metal-apiservers serves gRPC traffic we are using a HTTPRoute because
# we use https://connectrpc.com/ to also allow non-gRPC clients in the future
kind: HTTPRoute
metadata:
  name: metal-apiserver
  {{- with .Values.httpRoute.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  parentRefs:
{{ toYaml .Values.httpRoute.parentRefs | indent 4 }}
  hostnames:
    - {{ .Values.v2_ingress_public_dns | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: metal-apiserver
          port: {{ .Values.ports.metal_apiserver }}
{{- end }}
{{- if .Values.httpRoute.httpsRedirect.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metal-control-plane-https-redirect
spec:
  parentRefs:
{{ toYaml .Values.httpRoute.httpsRedirect.redirectParentRefs | indent 4 }}
  hostnames:
    - {{ .Values.ingress_public_dns | quote }}
{{- if .Values.metal_apiserver.enabled }}
    - {{ .Values.v2_ingress_public_dns | quote }}
{{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
{{- end }}
